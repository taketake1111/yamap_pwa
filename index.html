<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>GPS Map</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
height:100%;
margin:0;
}

#map{
height:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

/* 地図 */

var map = L.map('map').setView([35,135],15);

L.tileLayer(
'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
{
maxZoom:18,
attribution:"地理院地図"
}).addTo(map);


/* 現在地 */

var marker=null;

/* 向き扇形 */

var cone=null;

/* 軌跡 */

var path=[];

var polyline=L.polyline([],{
color:"red",
weight:4
}).addTo(map);

var firstFix=true;


/* 扇形作成 */

function createCone(lat,lon,heading){

var dist=0.0007;
var spread=25;

function point(angle){

var rad=angle*Math.PI/180;

return [
lat + dist*Math.cos(rad),
lon + dist*Math.sin(rad)
];

}

return [
[lat,lon],
point(heading-spread),
point(heading),
point(heading+spread)
];

}


/* GPS更新 */

function updatePosition(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

path.push([lat,lon]);

/* 現在地マーカー */

if(marker==null){

marker=L.circleMarker(
[lat,lon],
{
radius:8,
color:"white",
weight:3,
fillColor:"blue",
fillOpacity:1
}).addTo(map);

}else{

marker.setLatLng([lat,lon]);

}

polyline.setLatLngs(path);

if(firstFix){

map.setView([lat,lon],16);
firstFix=false;

}

}


/* GPS */

navigator.geolocation.watchPosition(
updatePosition,
function(err){alert(err.message);},
{enableHighAccuracy:true}
);


/* 方位センサー */

window.addEventListener("deviceorientationabsolute",function(e){

var heading=e.alpha;

if(marker && heading!=null){

var lat=marker.getLatLng().lat;
var lon=marker.getLatLng().lng;

var shape=createCone(lat,lon,heading);

if(cone==null){

cone=L.polygon(shape,{
color:"blue",
fillOpacity:0.35,
weight:1
}).addTo(map);

}else{

cone.setLatLngs(shape);

}

}

});


/* service worker */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
