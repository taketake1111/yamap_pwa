<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>GPS Map</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

html,body{
height:100%;
margin:0;
}

#map{
height:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

/* 地図 */

var map = L.map('map').setView([35,135],15);

L.tileLayer(
'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
{
maxZoom:18,
attribution:"地理院地図"
}).addTo(map);


/* 現在地 */

var marker=null;

/* 進行方向扇形 */

var headingCone=null;

/* 軌跡 */

var path=[];

var polyline=L.polyline([],{
color:"red",
weight:4
}).addTo(map);


/* 初回GPS */

var firstFix=true;


/* GPS更新 */

function updatePosition(pos){

var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

path.push([lat,lon]);

if(marker==null){

marker=L.circleMarker(
[lat,lon],
{
radius:8,
color:"white",
weight:3,
fillColor:"blue",
fillOpacity:1
}).addTo(map);

}else{

marker.setLatLng([lat,lon]);

}

polyline.setLatLngs(path);

if(firstFix){

map.setView([lat,lon],16);
firstFix=false;

}

}


/* GPS取得 */

navigator.geolocation.watchPosition(
updatePosition,
function(err){alert(err.message);},
{enableHighAccuracy:true}
);


/* 扇形を作る関数 */

function createCone(lat,lon,heading){

var dist=0.0008;

var angle=30;

var p1=[
lat+dist*Math.cos((heading-angle)*Math.PI/180),
lon+dist*Math.sin((heading-angle)*Math.PI/180)
];

var p2=[
lat+dist*Math.cos((heading+angle)*Math.PI/180),
lon+dist*Math.sin((heading+angle)*Math.PI/180)
];

return [ [lat,lon],p1,p2 ];

}


/* 方位センサー */

window.addEventListener("deviceorientationabsolute",function(e){

var heading=e.alpha;

if(marker && heading!=null){

var lat=marker.getLatLng().lat;
var lon=marker.getLatLng().lng;

var cone=createCone(lat,lon,heading);

if(headingCone==null){

headingCone=L.polygon(cone,{
color:"blue",
fillOpacity:0.3
}).addTo(map);

}else{

headingCone.setLatLngs(cone);

}

}

});


/* service worker */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
